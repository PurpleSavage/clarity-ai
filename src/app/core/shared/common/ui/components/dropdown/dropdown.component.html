<div class="relative">
    <button
        (click)="isOpen.set(!isOpen())"
        class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-white/10 bg-white/5 text-sm text-white/70 hover:bg-white/10 transition-colors">
        <span>{{ selectedItem()?.label ?? placeholder() }}</span>
        <svg lucideChevronDown class="w-4 h-4 transition-transform" [class.rotate-180]="isOpen()"></svg>
    </button>

    @if (isOpen()) {
        <div class="absolute top-full mt-1 right-0 w-40 rounded-xl border border-white/10 bg-zinc-900 shadow-xl z-50 p-1">
            @for (item of items(); track item.value) {
                <button
                    (click)="select(item)"
                    class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-white/5 transition-colors"
                    [class.text-emerald-400]="item.variant === 'success'"
                    [class.text-red-400]="item.variant === 'danger'"
                    [class.text-white/70]="!item.variant || item.variant === 'default'"
                    [class.bg-white/5]="selectedItem()?.value === item.value"
                >
                    {{ item.label }}
                </button>
            }
        </div>
    }
</div>
