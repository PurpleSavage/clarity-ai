<div class="w-full  px-4 flex items-center justify-end gap-4 border-b border-white/20 p-3">
    <p class="text-white">{{ currentRoute() }}</p>
    <div class="flex flex-1 items-center justify-end gap-4">
        <button class="cursor-pointer hover:opacity-70 transition-opacity" type="button">
            <svg lucideBell class="w-5 h-5 text-white"></svg>
        </button>

        <div class="w-0.5 h-6 bg-white/20"></div>

        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-sm font-medium text-white leading-none">{{ userSummary().name }}</p>
                <p class="text-[10px] text-white/60 mt-1 leading-none">{{ userSummary().email }}</p>
            </div>
            <div class="p-2 rounded-full bg-white/5 border border-white/10">
                <svg lucideUser class="w-5 h-5 text-white"></svg>
            </div>
        </div>
    </div>
</div>
