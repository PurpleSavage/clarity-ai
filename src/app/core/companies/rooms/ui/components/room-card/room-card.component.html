<div class="group relative rounded-2xl border border-white/10 bg-white/5 p-5 hover:border-white/20 hover:bg-white/[0.07] transition-all cursor-pointer">
    
    <!-- header -->
    <div class="flex items-start justify-between mb-4">
        <div class="flex items-center gap-2">
            <div class="p-2 rounded-xl bg-white/5 border border-white/10">
                <svg lucideHash class="w-4 h-4 text-white/60"></svg>
            </div>
            <h3 class="text-sm font-semibold text-white">{{ room().topic }}</h3>
        </div>

        <!-- badge activo/inactivo -->
        <span 
            class="text-[10px] font-medium px-2 py-0.5 rounded-full border"
            [class.bg-emerald-500/10]="room().isActive"
            [class.border-emerald-500/20]="room().isActive"
            [class.text-emerald-400]="room().isActive"
            [class.bg-red-500/10]="!room().isActive"
            [class.border-red-500/20]="!room().isActive"
            [class.text-red-400]="!room().isActive"
        >
            {{ room().isActive ? 'Activo' : 'Inactivo' }}
        </span>
    </div>

    <!-- slug -->
    <p class="text-xs text-white/40 mb-3">/{{ room().slug }}</p>

    <!-- threads count -->
    <div class="flex items-center gap-1.5 mb-4 px-3 py-2 rounded-xl bg-white/5 border border-white/10 w-fit">
        <svg lucideMessageSquare class="w-3.5 h-3.5 text-white/40"></svg>
        <span class="text-xs text-white/50">{{ room().threadsCount }}</span>
        <span class="text-xs text-white/30">threads</span>
    </div>

    <!-- footer -->
    <div class="flex items-center gap-1.5 text-white/30">
        <svg lucideCalendar class="w-3 h-3"></svg>
        <span class="text-[10px]">{{ room().createdAt | date:'mediumDate' }}</span>
    </div>

</div>
